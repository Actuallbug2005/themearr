<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-950">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Themearr</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Scrollbar styling */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #111827; }
    ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }

    .status-pending    { @apply bg-yellow-500/20 text-yellow-300 border border-yellow-500/30; }
    .status-downloaded { @apply bg-green-500/20  text-green-300  border border-green-500/30;  }

    .movie-item.active { @apply bg-indigo-600/30 border-l-4 border-indigo-500; }
    .movie-item        { @apply border-l-4 border-transparent; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 1s linear infinite; }
  </style>
</head>
<body class="h-full text-gray-100 font-sans" id="app">

  <!-- Top bar -->
  <header class="fixed top-0 inset-x-0 z-10 flex items-center justify-between px-6 py-3
                 bg-gray-900 border-b border-gray-800 shadow-lg">
    <div class="flex items-center gap-3">
      <svg class="w-7 h-7 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2
                 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2
                 1.343-2 3-2 3 .895 3 2z"/>
      </svg>
      <span class="text-xl font-bold tracking-tight text-white">Themearr</span>
    </div>
    <div class="flex items-center gap-3">
      <span id="sync-status" class="text-sm text-gray-400"></span>
      <button id="btn-sync"
              class="px-4 py-1.5 rounded-md bg-indigo-600 hover:bg-indigo-500 text-sm
                     font-medium transition-colors flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0
                   0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
        Sync Radarr
      </button>
    </div>
  </header>

  <!-- Main layout -->
  <div class="flex h-full pt-14">

    <!-- Left pane: movie list -->
    <aside class="w-72 shrink-0 flex flex-col bg-gray-900 border-r border-gray-800 overflow-hidden">
      <!-- Search box -->
      <div class="p-3 border-b border-gray-800">
        <input id="search-input" type="text" placeholder="Filter movies…"
               class="w-full bg-gray-800 rounded-md px-3 py-1.5 text-sm
                      placeholder-gray-500 focus:outline-none focus:ring-1 focus:ring-indigo-500"/>
      </div>
      <!-- Stats -->
      <div id="stats" class="px-4 py-2 text-xs text-gray-500 border-b border-gray-800 flex gap-4">
        <span id="stat-total">0 movies</span>
        <span id="stat-downloaded" class="text-green-400">0 done</span>
        <span id="stat-pending" class="text-yellow-400">0 pending</span>
      </div>
      <!-- List -->
      <ul id="movie-list" class="flex-1 overflow-y-auto"></ul>
    </aside>

    <!-- Right pane: search results -->
    <main class="flex-1 overflow-y-auto bg-gray-950 p-6">
      <div id="right-empty" class="h-full flex flex-col items-center justify-center text-gray-600">
        <svg class="w-16 h-16 mb-4 opacity-30" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M15 10l4.553-2.069A1 1 0 0121 8.87v6.26a1 1 0 01-1.447.894L15 14M5 18h8a2
                   2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>
        </svg>
        <p class="text-lg">Select a movie to find its theme song</p>
      </div>

      <div id="right-loading" class="hidden h-full flex flex-col items-center justify-center gap-4">
        <svg class="spinner w-10 h-10 text-indigo-400" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
          <path class="opacity-75" fill="currentColor"
                d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"/>
        </svg>
        <p class="text-gray-400">Searching YouTube…</p>
      </div>

      <div id="right-content" class="hidden">
        <h2 id="movie-heading" class="text-2xl font-bold mb-1 text-white"></h2>
        <p class="text-sm text-gray-400 mb-6">Pick the best match and click Accept &amp; Download</p>
        <div id="results-grid" class="grid grid-cols-1 xl:grid-cols-3 gap-6"></div>
      </div>
    </main>
  </div>

  <!-- Toast -->
  <div id="toast"
       class="fixed bottom-6 right-6 z-50 hidden px-4 py-3 rounded-lg shadow-xl
              text-sm font-medium transition-all duration-300">
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
